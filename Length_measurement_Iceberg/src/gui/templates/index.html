<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iceberg Tracking System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #00d4ff;
        }
        
        .main-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }
        
        .video-section {
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
        }
        
        #video-feed {
            width: 100%;
            border-radius: 5px;
        }
        
        .controls-section {
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
        }
        
        .control-group {
            margin-bottom: 20px;
        }
        
        .control-group h3 {
            color: #00d4ff;
            margin-bottom: 10px;
            border-bottom: 2px solid #00d4ff;
            padding-bottom: 5px;
        }
        
        button {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #00d4ff;
            color: #1a1a2e;
            font-weight: bold;
        }
        
        .btn-primary:hover {
            background: #00a8cc;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 212, 255, 0.3);
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-success:hover {
            background: #218838;
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c82333;
        }
        
        .status-panel {
            background: #0f3460;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
        
        .status-item {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            padding: 5px 0;
            border-bottom: 1px solid #16213e;
        }
        
        .status-label {
            color: #aaa;
        }
        
        .status-value {
            color: #00d4ff;
            font-weight: bold;
        }
        
        .progress-bar {
            width: 100%;
            height: 30px;
            background: #0f3460;
            border-radius: 15px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #00a8cc);
            transition: width 0.5s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        
        .alert {
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            display: none;
        }
        
        .alert-success {
            background: #28a745;
            color: white;
        }
        
        .alert-error {
            background: #dc3545;
            color: white;
        }
        
        .alert-info {
            background: #17a2b8;
            color: white;
        }
        
        input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: #0f3460;
            border: 1px solid #00d4ff;
            border-radius: 5px;
            color: white;
            font-size: 14px;
        }
        
        label {
            color: #aaa;
            font-size: 14px;
            display: block;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Iceberg Tracking System</h1>
        
        <div class="main-layout">
            <!-- Video Feed Section -->
            <div class="video-section">
                <h3>📹 Live Camera Feed</h3>
                <img id="video-feed" src="/video_feed" alt="Video Feed">
            </div>
            
            <!-- Controls Section -->
            <div class="controls-section">
                <!-- Survey Status -->
                <div class="control-group">
                    <h3>📊 Survey Status</h3>
                    <div class="status-panel">
                        <div class="status-item">
                            <span class="status-label">Corners Found:</span>
                            <span class="status-value" id="corners-count">0/5</span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">Numbers:</span>
                            <span class="status-value" id="numbers-list">[]</span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">Sequence:</span>
                            <span class="status-value" id="sequence-type">-</span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">Keel Depth:</span>
                            <span class="status-value" id="keel-depth">Not measured</span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">Points:</span>
                            <span class="status-value" id="points">0/35</span>
                        </div>
                    </div>
                    
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress" style="width: 0%">0%</div>
                    </div>
                </div>
                
                <!-- Alert Box -->
                <div id="alert-box" class="alert"></div>
                
                <!-- Survey Controls -->
                <div class="control-group">
                    <h3>🎮 Survey Controls</h3>
                    <button class="btn-primary" onclick="detectNumber()">
                        🔍 Detect Number (D)
                    </button>
                    <button class="btn-primary" onclick="measureDepth()">
                        📏 Measure Depth (M)
                    </button>
                    <button class="btn-success" onclick="saveSurvey()">
                        💾 Save Survey (S)
                    </button>
                    <button class="btn-danger" onclick="resetSurvey()">
                        🔄 Reset Survey (R)
                    </button>
                </div>
                
                <!-- Threat Calculator -->
                <div class="control-group">
                    <h3>⚠️ Threat Calculator</h3>
                    <label>Latitude (decimal degrees):</label>
                    <input type="number" id="iceberg-lat" step="0.0001" placeholder="45.5000">
                    
                    <label>Longitude (decimal degrees):</label>
                    <input type="number" id="iceberg-lon" step="0.0001" placeholder="-48.5000">
                    
                    <label>Heading (degrees, 0-360):</label>
                    <input type="number" id="iceberg-heading" step="1" min="0" max="360" placeholder="180">
                    
                    <label>Keel Depth (meters, auto-filled):</label>
                    <input type="number" id="iceberg-keel" step="0.001" placeholder="Auto">
                    
                    <button class="btn-primary" onclick="calculateThreats()" style="margin-top: 10px;">
                        🧮 Calculate Threats (T)
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Update status every second
        setInterval(updateStatus, 1000);
        
        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.key === 'd' || e.key === 'D') detectNumber();
            if (e.key === 'm' || e.key === 'M') measureDepth();
            if (e.key === 's' || e.key === 'S') saveSurvey();
            if (e.key === 'r' || e.key === 'R') resetSurvey();
            if (e.key === 't' || e.key === 'T') calculateThreats();
        });
        
        function updateStatus() {
            fetch('/api/survey_status')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('corners-count').textContent = 
                        `${data.corners_found}/5`;
                    document.getElementById('numbers-list').textContent = 
                        JSON.stringify(data.numbers);
                    document.getElementById('sequence-type').textContent = 
                        data.sequence_type || '-';
                    
                    if (data.keel_depth) {
                        document.getElementById('keel-depth').textContent = 
                            `${data.keel_depth.toFixed(3)}m`;
                        document.getElementById('iceberg-keel').value = data.keel_depth;
                    }
                    
                    document.getElementById('points').textContent = 
                        `${data.points_earned}/35`;
                    
                    const progress = (data.corners_found / 5) * 100;
                    const progressBar = document.getElementById('progress');
                    progressBar.style.width = `${progress}%`;
                    progressBar.textContent = `${progress.toFixed(0)}%`;
                });
        }
        
        function showAlert(message, type = 'info') {
            const alertBox = document.getElementById('alert-box');
            alertBox.className = `alert alert-${type}`;
            alertBox.textContent = message;
            alertBox.style.display = 'block';
            
            setTimeout(() => {
                alertBox.style.display = 'none';
            }, 3000);
        }
        
        function detectNumber() {
            fetch('/api/detect_number', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showAlert(`✓ Number ${data.number} detected (${(data.confidence * 100).toFixed(0)}%)`, 'success');
                    } else {
                        showAlert(`✗ ${data.message}`, 'error');
                    }
                    updateStatus();
                });
        }
        
        function measureDepth() {
            fetch('/api/measure_depth', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showAlert(`✓ Depth: ${data.depth.toFixed(3)}m (${(data.confidence * 100).toFixed(0)}%)`, 'success');
                    } else {
                        showAlert(`✗ ${data.message}`, 'error');
                    }
                    updateStatus();
                });
        }
        
        function saveSurvey() {
            fetch('/api/save_survey', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showAlert(`✓ Survey saved! ID: ${data.survey_id}`, 'success');
                    } else {
                        showAlert(`✗ ${data.message}`, 'error');
                    }
                });
        }
        
        function resetSurvey() {
            if (confirm('Reset survey? This will clear all data.')) {
                fetch('/api/reset_survey', { method: 'POST' })
                    .then(response => response.json())
                    .then(data => {
                        showAlert('✓ Survey reset', 'info');
                        updateStatus();
                    });
            }
        }
        
        function calculateThreats() {
            const lat = parseFloat(document.getElementById('iceberg-lat').value);
            const lon = parseFloat(document.getElementById('iceberg-lon').value);
            const heading = parseFloat(document.getElementById('iceberg-heading').value);
            const keel = parseFloat(document.getElementById('iceberg-keel').value);
            
            if (isNaN(lat) || isNaN(lon) || isNaN(heading)) {
                showAlert('✗ Please enter valid coordinates and heading', 'error');
                return;
            }
            
            fetch('/api/calculate_threats', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    latitude: lat,
                    longitude: lon,
                    heading: heading,
                    keel_depth: keel
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showAlert('✓ Threats calculated! Check console for details', 'success');
                    console.log('Threat Assessment:', data.results);
                    alert(formatThreatResults(data.results));
                } else {
                    showAlert(`✗ ${data.message}`, 'error');
                }
            });
        }
        
        function formatThreatResults(results) {
            let text = 'THREAT ASSESSMENT RESULTS\n\n';
            text += 'PLATFORM THREATS:\n';
            for (const [name, data] of Object.entries(results.platforms)) {
                text += `${name}: ${data.threat.toUpperCase()} (${data.distance_nm.toFixed(2)} NM)\n`;
            }
            text += '\nSUBSEA THREATS:\n';
            for (const [name, data] of Object.entries(results.subsea)) {
                text += `${name}: ${data.threat.toUpperCase()}\n`;
            }
            return text;
        }
        
        // Initial status update
        updateStatus();
    </script>
</body>
</html>
