# RealSense Camera Configuration
# Intel RealSense D415 settings for underwater operation

camera:
  # Resolution settings
  width: 1280
  height: 720
  fps: 30
  
  # Stream enablement
  enable_color: true
  enable_depth: true
  enable_infrared: false
  
  # Depth settings
  depth:
    preset: "high_accuracy"  # Options: high_accuracy, high_density, medium_density
    min_distance: 0.3  # meters
    max_distance: 3.0  # meters
    depth_units: 0.001  # meters (1mm)
  
  # Post-processing filters
  filters:
    decimation:
      enabled: true
      magnitude: 2
    
    spatial:
      enabled: true
      smooth_alpha: 0.5
      smooth_delta: 20
      magnitude: 2
      hole_fill: 0
    
    temporal:
      enabled: true
      smooth_alpha: 0.4
      smooth_delta: 20
      persistence: 3
    
    hole_filling:
      enabled: true
      mode: 1  # 0=fill from left, 1=farest, 2=nearest
  
  # Advanced options
  advanced:
    laser_power: 150  # 0-360 (higher for better range, lower for less interference)
    accuracy: 3  # 1-3 (higher = more accurate but slower)
    motion_range: 0  # 0-100 (0 = close range, 100 = far range)
    confidence_threshold: 3  # 0-3 (higher = more confident measurements only)
    
# Underwater-specific settings
underwater:
  # Image enhancement
  enhancement:
    enable_clahe: true
    clahe_clip_limit: 3.0
    clahe_tile_size: 8
    
    enable_white_balance: true
    white_balance_method: "gray_world"
    
    enable_denoise: true
    denoise_strength: 10
    
    enable_sharpen: false
    sharpen_strength: 0.5
  
  # Depth adjustments for water
  depth_correction:
    enabled: true
    water_refractive_index: 1.333  # Seawater
    air_refractive_index: 1.000
    
  # Lighting compensation
  lighting:
    auto_exposure: true
    exposure_time: 6000  # microseconds (if not auto)
    gain: 16  # 16-248 (if not auto)
    white_balance_auto: true
